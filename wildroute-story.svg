<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1a14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D9E75;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#25c490;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="logoshadow">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#1D9E75" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bgGrad)"/>

  <!-- Subtle glow blobs -->
  <ellipse cx="540" cy="220" rx="400" ry="220" fill="#1D9E75" opacity="0.07"/>
  <ellipse cx="540" cy="1700" rx="350" ry="200" fill="#1D9E75" opacity="0.05"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="640" x2="1080" y2="640" stroke="#1D9E75" stroke-width="1" opacity="0.06"/>
  <line x1="0" y1="1280" x2="1080" y2="1280" stroke="#1D9E75" stroke-width="1" opacity="0.06"/>
  <line x1="360" y1="0" x2="360" y2="1920" stroke="#1D9E75" stroke-width="1" opacity="0.06"/>
  <line x1="720" y1="0" x2="720" y2="1920" stroke="#1D9E75" stroke-width="1" opacity="0.06"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1080" height="5" fill="url(#greenGrad)"/>

  <!-- ===================== -->
  <!-- LOGO - actual PNG embedded -->
  <!-- ===================== -->
  <!-- Glow ring behind logo -->
  <circle cx="540" cy="260" r="118" fill="#1D9E75" opacity="0.15" filter="url(#logoshadow)"/>
  <!-- Actual logo image -->
  <image href="data:image/png;base64,"
        x="336" y="156" width="208" height="208"/>

  <!-- Brand name -->
  <text x="540" y="410" font-family="Georgia, serif" font-size="58" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">
    <tspan fill="#ffffff">Wild</tspan><tspan fill="#1D9E75">Route</tspan>
  </text>

  <!-- Tagline -->
  <text x="540" y="465" font-family="Georgia, serif" font-size="24" fill="#5DCAA5" text-anchor="middle" letter-spacing="4" font-style="italic">your route to real adventure</text>

  <!-- Thin divider -->
  <line x1="400" y1="500" x2="680" y2="500" stroke="#1D9E75" stroke-width="1" opacity="0.35"/>

  <!-- ===================== -->
  <!-- Mountain illustration -->
  <!-- ===================== -->
  <!-- Background mountains -->
  <polygon points="0,840 180,580 360,840" fill="#0d1f18" opacity="0.8"/>
  <polygon points="200,840 430,500 660,840" fill="#0f2416" opacity="0.9"/>
  <polygon points="420,840 680,440 940,840" fill="#0d1f18" opacity="0.8"/>
  <polygon points="700,840 900,570 1080,840" fill="#0a1a12" opacity="0.9"/>
  <!-- Hero mountain -->
  <polygon points="140,840 540,360 940,840" fill="#112a1c"/>
  <!-- Snow cap -->
  <polygon points="462,450 540,360 618,450 578,460 540,415 502,460" fill="#e8f5f0" opacity="0.9"/>
  <!-- Mountain accent lines -->
  <line x1="540" y1="360" x2="380" y2="660" stroke="#1D9E75" stroke-width="1.5" opacity="0.25"/>
  <line x1="540" y1="360" x2="700" y2="660" stroke="#1D9E75" stroke-width="1.5" opacity="0.25"/>
  <!-- Ground -->
  <rect x="0" y="840" width="1080" height="18" fill="#0d1f18"/>
  <rect x="0" y="850" width="1080" height="600" fill="#0a0a0a"/>

  <!-- Stars -->
  <circle cx="120" cy="430" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="280" cy="390" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="820" cy="405" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="960" cy="450" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="200" cy="490" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="880" cy="490" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="340" cy="555" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="750" cy="530" r="1.5" fill="#ffffff" opacity="0.5"/>

  <!-- ===================== -->
  <!-- MAIN HEADLINE -->
  <!-- ===================== -->
  <ellipse cx="540" cy="1060" rx="320" ry="75" fill="#1D9E75" opacity="0.1"/>
  <text x="540" y="980" font-family="Georgia, serif" font-size="52" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1">We Are</text>
  <text x="540" y="1075" font-family="Georgia, serif" font-size="96" font-weight="900" fill="url(#greenGrad)" text-anchor="middle" letter-spacing="-2" filter="url(#glow)">LIVE!</text>
  <text x="540" y="1130" font-family="Arial, sans-serif" font-size="28" fill="#777777" text-anchor="middle" letter-spacing="2">India's first adventure booking platform</text>

  <!-- Divider -->
  <line x1="200" y1="1170" x2="460" y2="1170" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="540" cy="1170" r="5" fill="#1D9E75"/>
  <line x1="620" y1="1170" x2="880" y2="1170" stroke="#2a2a2a" stroke-width="1"/>

  <!-- ===================== -->
  <!-- STATS -->
  <!-- ===================== -->
  <rect x="80" y="1205" width="260" height="130" rx="20" fill="#111111" stroke="#1a1a1a" stroke-width="1"/>
  <text x="210" y="1268" font-family="Arial, sans-serif" font-size="46" font-weight="800" fill="#1D9E75" text-anchor="middle">247</text>
  <text x="210" y="1308" font-family="Arial, sans-serif" font-size="17" fill="#555555" text-anchor="middle">Trekkers waiting</text>

  <rect x="410" y="1205" width="260" height="130" rx="20" fill="#111111" stroke="#1a1a1a" stroke-width="1"/>
  <text x="540" y="1268" font-family="Arial, sans-serif" font-size="46" font-weight="800" fill="#1D9E75" text-anchor="middle">38</text>
  <text x="540" y="1308" font-family="Arial, sans-serif" font-size="17" fill="#555555" text-anchor="middle">Agencies signed up</text>

  <rect x="740" y="1205" width="260" height="130" rx="20" fill="#111111" stroke="#1a1a1a" stroke-width="1"/>
  <text x="870" y="1268" font-family="Arial, sans-serif" font-size="46" font-weight="800" fill="#1D9E75" text-anchor="middle">12</text>
  <text x="870" y="1308" font-family="Arial, sans-serif" font-size="17" fill="#555555" text-anchor="middle">Destinations</text>

  <!-- ===================== -->
  <!-- LIVE BADGE -->
  <!-- ===================== -->
  <rect x="300" y="1378" width="480" height="68" rx="34" fill="#1a1a1a" stroke="#1D9E75" stroke-width="1.5"/>
  <circle cx="348" cy="1412" r="9" fill="#1D9E75" opacity="0.25"/>
  <circle cx="348" cy="1412" r="5" fill="#1D9E75"/>
  <text x="548" y="1420" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="1">Waitlist is open now</text>

  <!-- ===================== -->
  <!-- CTA BUTTON -->
  <!-- ===================== -->
  <rect x="160" y="1480" width="760" height="112" rx="56" fill="url(#greenGrad)" filter="url(#softglow)"/>
  <text x="540" y="1542" font-family="Arial, sans-serif" font-size="40" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="2">REGISTER FREE →</text>
  <text x="540" y="1576" font-family="Arial, sans-serif" font-size="19" fill="#c8f0e4" text-anchor="middle" letter-spacing="1">Limited early spots · No credit card needed</text>

  <!-- Domain pill -->
  <rect x="350" y="1628" width="380" height="58" rx="29" fill="#111111" stroke="#222222" stroke-width="1.5"/>
  <text x="540" y="1664" font-family="Arial, sans-serif" font-size="25" fill="#1D9E75" text-anchor="middle" letter-spacing="1">gowildroute.com</text>

  <!-- Activities line -->
  <text x="540" y="1748" font-family="Georgia, serif" font-size="22" fill="#333333" text-anchor="middle" letter-spacing="5" font-style="italic">trekking · rafting · paragliding · more</text>

  <!-- Social handle -->
  <text x="540" y="1815" font-family="Arial, sans-serif" font-size="22" fill="#3a3a3a" text-anchor="middle" letter-spacing="3">@go.wildroute</text>

  <!-- Bottom border -->
  <rect x="0" y="1915" width="1080" height="5" fill="url(#greenGrad)"/>
</svg>
